name: Client Linux

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - '.github/workflows/client-linux.yml'
  pull_request:
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - '.github/workflows/client-linux.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libpipewire-0.3-dev libgbm-dev

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @tandem/shared build

      - name: Prepare Linux AppImage hook
        run: bash scripts/linux/prepare-linux-bundle.sh

      - name: Build AppImage
        run: pnpm --filter @tandem/client exec tauri build -- --no-default-features

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-presenter-assist-linux-x86_64
          path: apps/client/src-tauri/target/release/bundle/appimage/*.AppImage
