name: Client Linux

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - '.github/workflows/client-linux.yml'
  pull_request:
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - '.github/workflows/client-linux.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NDI SDK
        uses: GrantSparks/grafton-ndi/.github/actions/setup-ndi-linux@v0.13.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libpipewire-0.3-dev libgbm-dev libxcb1-dev libxrandr-dev libdbus-1-dev libwayland-dev libegl-dev libclang-dev pkg-config

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @tandem/shared build

      - name: Prepare Linux AppImage hook
        run: bash scripts/linux/prepare-linux-bundle.sh

      - name: Build AppImage
        env:
          NDI_SDK_DIR: ${{ runner.temp }}/ndi-sdk
        run: pnpm --filter @tandem/client exec tauri build && node scripts/linux/post-bundle-ndi.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-presenter-assist-linux-x86_64
          path: apps/client/src-tauri/target/release/bundle/appimage/*.AppImage
