name: Client macOS

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - '.github/workflows/client-macos.yml'
  pull_request:
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - '.github/workflows/client-macos.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @tandem/shared build

      - name: Build dmg
        run: pnpm --filter @tandem/client build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-presenter-assist-macos
          path: apps/client/src-tauri/target/release/bundle/dmg/*.dmg
